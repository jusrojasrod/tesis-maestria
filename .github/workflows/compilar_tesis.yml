name: Compilar Tesis LaTeX

on:
  push:
    branches: [ "main" ]

# ¡Esto es crucial! Le da permiso al servidor para crear la página de descarga.
permissions:
  contents: write 

jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Compilar documento LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: "main.tex"
          compiler: latexmk

      - name: Guardar el PDF como Artefacto (Copia de seguridad de 90 días)
        uses: actions/upload-artifact@v4
        with:
          name: Tesis-PDF
          path: "main.pdf"

      - name: Actualizar Enlace Permanente (Release)
        uses: ncipollo/release-action@v1
        with:
          tag: "latest"
          name: "Borrador Actual"
          body: "Esta es la versión más reciente de la tesis, compilada automáticamente desde la rama main."
          artifacts: "main.pdf"
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}